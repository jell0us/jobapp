{% extends 'base.html' %}
{% load static %}

{% block title %}Application Submitted{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="jp-card text-center">
                <div class="card-body" style="padding:3rem 2rem;">

                    <div style="font-size:4rem;margin-bottom:1rem;">🎉</div>

                    <h2 style="font-weight:700;color:var(--jp-navy);letter-spacing:-.03em;margin-bottom:.5rem;">
                        Application Submitted!
                    </h2>
                    <p style="color:var(--jp-text-muted);margin-bottom:2rem;">
                        Your application has been received. The employer will review it
                        and update your status. Good luck!
                    </p>

                    <div class="d-flex gap-2 justify-content-center flex-wrap">
                        <a href="{% url 'my_applications' %}" class="jp-btn jp-btn-primary">
                            View My Applications
                        </a>
                        <a href="{% url 'job_list' %}" class="jp-btn jp-btn-ghost">
                            Browse More Jobs
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
